[package]
name = "koi"
version = "0.0.1"
edition = "2024"

[[bin]]
name = "koi"
path = "src/main.rs"

[dependencies]
koi = { path = "../app", package = "koi-app" }
koi-api = { path = "../api" }
clap = { version = "4", features = ["derive"] }
koi-gui = { path = "../../interfaces/gui", optional = true }
koi-cli = { path = "../../interfaces/cli" }
koi-client = { path = "../client" }
anyhow = "1"
dotenvy = "0.15.7"
futures = "0.3"
poem = { version = "3.1.6", git = "https://github.com/v3xlabs/poem", branch = "master", features = ["embed", "websocket"] }
rust-embed = "8"
serde_json = "1"
tokio = { version = "1", features = ["macros", "net", "rt-multi-thread", "sync", "time"] }
tracing = "0.1.41"
tracing-subscriber = { version = "0.3", default-features = false, features = ["fmt", "ansi"] }

[features]
default = ["gui"]
gui = ["dep:koi-gui"]
