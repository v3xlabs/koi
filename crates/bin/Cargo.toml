[package]
name = "koi"
version = "0.0.1"
edition = "2024"

[[bin]]
name = "koi"
path = "src/main.rs"

[dependencies]
koi = { path = "../app", package = "koi-app" }
koi-daemon = { path = "../daemon" }
clap = { version = "4", features = ["derive"] }
koi-gui = { path = "../../interfaces/gui", optional = true }
anyhow = "1"
dotenvy = "0.15.7"
tokio = { version = "1", features = ["macros", "net", "rt-multi-thread", "time"] }
tracing = "0.1.41"
tracing-subscriber = { version = "0.3", default-features = false, features = ["fmt", "ansi"] }

[features]
default = ["gui"]
gui = ["dep:koi-gui"]
